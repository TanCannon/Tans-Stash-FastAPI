<!-- Rebrand Notification Banner -->
<div id="rebrand-banner" style="display:none;">
  <span>
    <strong>Tan’s Blogpost</strong> is now <strong>Tan’s Stash (tansstash.com)</strong>.
    Same content. Same tools. Just a new name.
  </span>
  <button id="rebrand-close" aria-label="Dismiss notification">✕</button>
</div>

<style>
  #rebrand-banner {
    font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    position: fixed;
    bottom: 20px; /* change to top: 20px if needed */
    left: 50%;
    transform: translateX(-50%);
    background: #0085a1 ;
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
    z-index: 9999;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    max-width: 90%;
  }

  #rebrand-banner button {
    background: none;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    opacity: 0.8;
  }

  #rebrand-banner button:hover {
    opacity: 1;
  }

  @media (max-width: 480px) {
    #rebrand-banner {
      font-size: 13px;
      padding: 10px 14px;
    }
  }
</style>

<script>
  (function () {
    const STORAGE_KEY = "rebrand_notice_dismissed_v1";
    const banner = document.getElementById("rebrand-banner");
    const closeBtn = document.getElementById("rebrand-close");

    if (!localStorage.getItem(STORAGE_KEY)) {
      banner.style.display = "flex";
    }

    closeBtn.addEventListener("click", function () {
      banner.style.display = "none";
      localStorage.setItem(STORAGE_KEY, "true");
    });
  })();
</script>
<!-- End Rebrand Notification Banner -->
